services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads
      - backend_templates:/app/templates
      - backend_debug:/app/analysis_debug
      - backend_data:/app/data
    environment:
      - ELEKTROSCAN_OPENCV_THREADS=1
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_uploads:
  backend_templates:
  backend_debug:
  backend_data:
